<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @layer base {
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }

        input[type="number"] {
          -moz-appearance: textfield;
        }
      }
    </style>
  </head>
  <body class="bg-slate-900 min-h-screen font-sans">
    <main
      class="max-w-7xl min-h-screen flex justify-center items-center mx-auto px-4"
    >
      <div
        class="rounded-2xl shadow-2xl w-full max-w-md bg-slate-800 border border-slate-700 p-10"
      >
        <div class="text-center mb-8">
          <h1 class="text-4xl font-bold text-white mb-2">Counter</h1>
          <p class="text-slate-400 text-sm">Track and manage your count</p>
        </div>

        <div class="flex items-center justify-center py-12">
          <div class="relative w-full">
            <input
              type="number"
              name=""
              id="input"
              value="0"
              class="w-full bg-slate-700 py-8 px-6 rounded-lg text-center outline-none text-6xl font-bold appearance-none text-blue-400 shadow-lg border border-slate-600 hover:border-slate-500 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 transition-all"
            />
          </div>
        </div>

        <div class="space-y-3">
          <div class="grid grid-cols-2 gap-3">
            <button
              type="button"
              class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-3xl font-semibold text-slate-200 shadow-md border border-slate-600 hover:border-slate-500 transition-all duration-150 active:scale-95"
              id="btn1"
            >
              −
            </button>

            <button
              type="button"
              class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-3xl font-semibold text-slate-200 shadow-md border border-slate-600 hover:border-slate-500 transition-all duration-150 active:scale-95"
              id="btn2"
            >
              +
            </button>
          </div>

          <button
            type="button"
            class="w-full px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg text-base font-semibold text-white shadow-md border border-blue-500 transition-all duration-150 active:scale-95"
            id="reset"
          >
            Reset 
          </button>
        </div>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
